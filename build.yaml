include:
  # The central Raytac engineering dongle brain (Fixed Native Hex Target)
  - board: nrf52840dongle_nrf52840
    shield: mdbt50q_dongle
    snippet: studio-rpc-usb-uart

  # The left peripheral keyboard half
  - board: nice_nano
    shield: sofle_left
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

  # The right peripheral keyboard half
  - board: nice_nano
    shield: sofle_right
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
